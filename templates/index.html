<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link href="https://iosevka-webfonts.github.io/iosevka-slab/iosevka-slab.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            background: #3B4252;
            color: #E5E9F0;
            height: 100vh;
            display: flex;
            place-items: center;
            -webkit-user-select: none;
            user-select: none;
            overflow: hidden;
        }

        pre {
            margin: 0;
            font-family: 'Iosevka Slab Web', monospace;
        }
        .wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .title-block {
            font-size: 16px;
            text-align: center;
        }

        .date-block {
            font-size: 120px;
            text-align: center;
        }

        #dateText {
            color: #81A1C1;
        }

        .time-cond {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #timeText {
            font-size: 120px;
            line-height: 1;
            margin: 0;
            padding: 0;
            white-space: nowrap;
        }

        #currentCondImg {
            width: 80px;
            height: auto;
            margin-left: 3%;
            margin-right: 3%;
            flex: 0 0 auto;
        }

        #currentCondText1 {
            font-size: 16px;
            margin: 0;
            padding: 0;
        }
        #currentCondText2 {
            font-size: 16px;
            margin: 0;
            padding: 0;
            text-align: right;
        }

        .plot-block {
            margin-top: 10px;
            display: flex;
            justify-content: center;
        }

        #plots {
            width: 90%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="title-block">
            <pre id="titleText"></pre>
        </div>
        <div class="date-block">
            <pre id="dateText"></pre>
        </div>
          <div class="time-cond">
            <pre id="timeText"></pre>
            <img id="currentCondImg" src="/currentCondImage" alt="current condition">
            <pre id="currentCondText1"></pre>
            <pre id="currentCondText2"></pre>
        </div>

        <div class="plot-block">
            <img id="plots" alt="plots">
        </div>
    </div>

  <script>
    async function updateTitle() {
      const res = await fetch("/titleText");
      const text = await res.text();
      document.getElementById("titleText").textContent = text;
    }

    async function updateDate() {
      const res = await fetch("/dateText");
      const text = await res.text();
      document.getElementById("dateText").textContent = text;
    }

    async function updateTime() {
      const res = await fetch("/timeText");
      const text = await res.text();
      document.getElementById("timeText").textContent = text;
    }

    async function updateCurrentCondTitle() {
      const res = await fetch("/currentCondText1");
      const text = await res.text();
      document.getElementById("currentCondText1").textContent = text;
    }

    async function updateCurrentCondValue() {
      const res = await fetch("/currentCondText2");
      const text = await res.text();
      document.getElementById("currentCondText2").textContent = text;
    }

    function updateCurrentCondImage() {
        document.getElementById("currentCondImg").src = "/currentCondImage?t=" + Date.now();
    }
    
    function updatePlot() {
      document.getElementById("plots").src = "/plot.svg?t=" + Date.now();
    }

    updateTitle();
    updateDate();
    updateTime();
    updateCurrentCondTitle();
    updateCurrentCondValue();
    updateCurrentCondImage();
    updatePlot();

    setInterval(updateTitle, 120000);    // Update title every 20 minutes
    setInterval(updateDate, 600000);   // Update date every 10 minutes (to catch day change)
    setInterval(updateTime, 1000);     // Update time every second
    setInterval(updateCurrentCondTitle, 300000); // Update current condition title 5 minutes
    setInterval(updateCurrentCondValue, 300000); // Update current condition value 5 minutes
    setInterval(updateCurrentCondImage, 300000); // Update current condition image every 5 min
    setInterval(updatePlot, 1800000); // Update plot every 30 minutes
  </script>
</body>
</html>
