<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://iosevka-webfonts.github.io/iosevka-term/iosevka-term.css" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      background: #3B4252;
      color: #E5E9F0;
      height: 100vh;
      display: grid;
      place-items: center;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    pre {
      font-family: "Iosevka Term Web", monospace;
      font-size: 18px;
      line-height: 1;
      white-space: pre;
      margin: 0;
      transform: translateX(30px);
    }
    img {
    width: 100%;
    height: auto;
    max-width: none; /* remove previous limit */
    }
  </style>
</head>
<body>
  <div class="wrap">
    <pre id="art"></pre>
    <img id="plot" alt="plot">
  </div>

  <script>
    async function updateArt() {
      const res = await fetch("/art");
      const html = await res.text();
      document.getElementById("art").innerHTML = html;
    }

    function updatePlot() {
      document.getElementById("plot").src = "/plot.svg?t=" + Date.now();
    }

    updateArt();
    updatePlot();

    setInterval(updateArt, 990);    // Update art every second
    setInterval(updatePlot, 900000); // Update plot every 15 minutes
  </script>
</body>
</html>
